version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
      POSTGRES_DB: portal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://portal:portal@db:5432/portal?schema=public
      PORT: 4000
      NODE_ENV: production
      CLIENT_URL: http://localhost:5173
      JWT_ACCESS_SECRET: change-me-access-secret
      JWT_REFRESH_SECRET: change-me-refresh-secret
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 7d
      ENABLE_CRON: "true"
      UPLOAD_DIR: /app/uploads
      PUBLIC_URL: http://localhost:4000
    ports:
      - "4000:4000"
    volumes:
      - uploads:/app/uploads
    command: sh -c "npx prisma migrate deploy && npm run seed && node dist/index.js"

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:4000/api
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  pgdata:
  uploads:
